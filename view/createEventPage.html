{% include 'header.html' %}

<div class="create-event-page container">
    <div class="create-event-card glass-card">
        <h1>Créer un événement</h1>
        <p class="subtitle">Organisez votre propre session sportive et invitez la communauté</p>

        <form action="{{ url_for('do_create_event') }}" method="post">
            <div class="create-event-grid">
                <!-- Nom de l'événement -->
                <div class="form-group full-width">
                    <label class="form-label" for="event-title">Nom de l'événement <span style="color: var(--error);">*</span></label>
                    <input type="text" id="event-title" name="event-name" class="form-input" placeholder="Ex: Match amical de foot à 5" required>
                </div>

                <!-- Activité -->
                <div class="form-group">
                    <label class="form-label" for="event-discipline">Activité sportive <span style="color: var(--error);">*</span></label>
                    <select id="event-discipline" name="event-activity" class="form-select" required>
                        <option value="" disabled selected>Choisissez une activité</option>
                        <option value="Football">Football</option>
                        <option value="Basketball">Basketball</option>
                        <option value="Cricket">Cricket</option>
                        <option value="Tennis">Tennis</option>
                        <option value="Volleyball">Volleyball</option>
                        <option value="Ping-pong">Ping-pong</option>
                        <option value="Badminton">Badminton</option>
                        <option value="Rugby">Rugby</option>
                        <option value="Golf">Golf</option>
                        <option value="Natation">Natation</option>
                        <option value="Athlétisme">Athlétisme</option>
                        <option value="Cyclisme">Cyclisme</option>
                        <option value="Gymnastique">Gymnastique</option>
                        <option value="Boxe">Boxe</option>
                        <option value="MMA">MMA</option>
                        <option value="Baseball">Baseball</option>
                        <option value="Ski">Ski</option>
                        <option value="Hockey sur glace">Hockey sur glace</option>
                        <option value="Hockey sur gazon">Hockey sur gazon</option>
                        <option value="Escalade">Escalade</option>
                        <option value="Musculation">Musculation</option>
                        <option value="Pétanque">Pétanque</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label class="form-label" for="event-date">Date <span style="color: var(--error);">*</span></label>
                    <input type="date" id="event-date" name="event-date" class="form-input" required>
                </div>

                <!-- Lieu -->
                <div class="form-group full-width">
                    <label class="form-label" for="event-location">Lieu <span style="color: var(--error);">*</span></label>
                    <input type="text" id="event-location" name="event-location" class="form-input" placeholder="Commencez à taper une adresse..." list="locations" required autocomplete="off">
                    <datalist id="locations">
                        {% for location in locations %}
                        <option value="{{ location }}">
                        {% endfor %}
                    </datalist>
                </div>

                <!-- Effectif -->
                <div class="form-group full-width">
                    <label class="form-label" for="event-headcount">Effectif maximum <span style="color: var(--error);">*</span></label>
                    <input type="number" id="event-headcount" name="event-headcount" class="form-input" min="2" max="100" placeholder="Nombre de participants incluant vous" required>
                </div>

                <!-- Description -->
                <div class="form-group full-width">
                    <label class="form-label" for="event-description">Description <span style="color: var(--error);">*</span></label>
                    <textarea id="event-description" name="event-description" class="form-textarea" placeholder="Détaillez le niveau attendu, le matériel requis, le point de rendez-vous..." required></textarea>
                </div>
            </div>

            <div style="margin-top: 24px; text-align: center;">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-check-circle"></i> Publier l'événement
                </button>
            </div>
        </form>
    </div>
</div>

{% include 'footer.html' %}
